services:
  redis:
    image: redis:alpine
    container_name: stellance_redis
    command: redis-server --appendonly yes --requirepass stellance_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "stellance_redis_dev", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data: